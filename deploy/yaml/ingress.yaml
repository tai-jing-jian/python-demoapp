apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-demoapp
  namespace: demoapp
spec:
  rules:
  - host: python.demoapp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: http
            port:
              name: http